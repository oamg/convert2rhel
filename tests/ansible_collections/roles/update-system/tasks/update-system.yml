---
# Using shell instead of the yum module because the yum module requires
# dnf/yum Python bindings only available in the system Python, which is
# too old for the Ansible version used (requires Python 3.7+).
- name: Update system
  shell: yum -y update --exclude=convert2rhel
  register: update

- name: Show update results
  debug:
    var: update.stdout_lines
