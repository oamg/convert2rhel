---
- name: Include .env file
  include_vars:
    file: /var/tmp/.env

- name: Download the internal CA certificate
  get_url:
    url: "{{ CACERT_URL }}"
    dest: /etc/pki/ca-trust/source/anchors/Current-IT-Root-CAs.pem

- name: Add the certificate to trusted CA's
  shell: update-ca-trust
  no_log: true
